<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="tab1" href="/tabs/tab1" *ngIf="!autenticado">
      <ion-icon aria-hidden="true" name="id-card"></ion-icon>
      <ion-label>Autenticacion</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2" [disabled]="!autenticado">
      <ion-icon aria-hidden="true" name="images"></ion-icon>
      <ion-label>Lista de Recetas</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab3" href="/tabs/tab3" [disabled]="!autenticado">
      <ion-icon aria-hidden="true" name="pencil"></ion-icon>
      <ion-label>Receta</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab4" href="/tabs/tab4" [disabled]="!autenticado">
      <ion-icon aria-hidden="true" name="person"></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
